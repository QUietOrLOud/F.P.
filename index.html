<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F.P.</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Songti SC', 'Noto Serif SC', STSong, '楷体', serif; 
        }

        #poem-box {
            width: 85vw;      
            max-width: 800px; 
            height: 350px;  
            display: flex;
            align-items: center; 
        }


        #poem-text {
            width: 100%;
            font-size: 2.2rem;    
            line-height: 2.0;     
            color: #eeeeee;      
            white-space: pre-wrap; 
            text-align: left; 
            text-shadow: 0 0 2px rgba(255,255,255,0.1);
        }


        .cursor {
            display: inline-block;
            width: 3px;           
            height: 1.1em;
            background-color: #eeeeee; 
            vertical-align: text-bottom;
            margin-left: 6px;
            animation: blink 1s step-end infinite; 
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            #poem-text {
                font-size: 1.6rem; 
            }
        }
    </style>
</head>
<body>

    <div id="poem-box">
        <div id="poem-text"></div>
    </div>

    <script>
        const poems = [
            `我向离群之燕祈祷七十七次
却换来了三百三十三余次的背叛`,

            `月光挣脱云层碎落满池
滋润着我的鳞和羽
教堂的钟敲响第七点五次
但是我仅剩的时间，祂去了哪儿？`,

            `我们曾试图伸手摘下第一千四百三十颗星
也曾试图剜去自己的每一根肋骨和肌腱
但无谓的尝试终被沉默所阻拦
可惜我终究不是天使
你才是`,

            `我曾振臂高呼
但胸腔内终将空无一物`,

            `第四十三片叶掠过夕阳
我们的骨终于在血肉中融化`,
        ];

        const poemElement = document.getElementById('poem-text');
        
        let poemIndex = 0;     
        let charIndex = 0;     
        let isDeleting = false;

        function typeEffect() {
            const currentPoemChars = [...poems[poemIndex]];
            
            poemElement.innerHTML = currentPoemChars.slice(0, charIndex).join('') + '<span class="cursor"></span>';
            
            let typeSpeed = 200;

            if (!isDeleting && charIndex === currentPoemChars.length) {
                typeSpeed = 3000;
                isDeleting = true;
            } 
            else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                poemIndex = (poemIndex + 1) % poems.length;
                typeSpeed = 1000; 
            } 
            else {
                if (isDeleting) {
                    charIndex--;    
                    typeSpeed = 80; 
                } else {
                    charIndex++;    
                    typeSpeed = 150 + Math.random() * 200; 
                }
            }

            setTimeout(typeEffect, typeSpeed);
        }

        setTimeout(typeEffect, 500);
    </script>
</body>
</html>
